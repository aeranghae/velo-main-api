apiVersion: apps/v1
kind: Deployment
metadata:
  name: scripto-main-api
  namespace: default
  labels:
    app: scripto-main-api
spec:
  # [수정] 레플리카 수를 3개로 설정하여 스프링 부트 3대를 동시에 가동합니다.
  replicas: 3
  # 무중단 배포(Rolling Update) 전략을 명시하여, 배포 시 서버가 끊기지 않도록 합니다.
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1       # 배포 시 새 버전 팟을 하나 더 먼저 띄우고
      maxUnavailable: 0 # 배포 중에도 기존 서버가 절대 꺼지지 않도록 보장
  selector:
    matchLabels:
      app: scripto-main-api
  template:
    metadata:
      labels:
        app: scripto-main-api
    spec:
      containers:
      - name: main-api
        image: oxxultus/scripto-main:latest
        imagePullPolicy: Always
        
        ports:
        - containerPort: 8080
          name: http
        
        volumeMounts:
        - name: config-volume
          mountPath: /app/config
        
        # 📂 중요: NFS 스토리지는 ReadWriteMany(RWX) 정책을 쓰기 때문에 
        # 3개의 스프링 부트 팟이 동시에 같은 폴더에 파일을 읽고 써도 충돌 나지 않고 완벽히 공유됩니다.
        - name: scripto-nfs-volume
          mountPath: /app/storage

      volumes:
      - name: config-volume
        secret:
          secretName: scripto-config
      - name: scripto-nfs-volume
        persistentVolumeClaim:
          claimName: scripto-storage-pvc
