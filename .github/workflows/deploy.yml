name: 애랑해 메인 서버 배포 (CI/CD)

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
    types: [closed]

jobs:
  build-and-deploy:
    if: github.event_name == 'push' || (github.event_name == 'pull_request' && github.event.pull_request.merged == true)
    runs-on: ubuntu-latest

    steps:
      - name: 1. 소스 코드 가져오기
        uses: actions/checkout@v4

      - name: 2. 자바 21 환경 설정
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: 3. 빌드 권한 부여
        run: chmod +x gradlew

      - name: 4. 프로젝트 빌드 (테스트 제외)
        run: ./gradlew clean build -x test

      - name: 5. GitHub 릴리즈 생성 및 JAR 업로드
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.run_number }}
          name: Release v${{ github.run_number }}
          body: |
            ## 🚀 자동 배포 릴리즈
            - 배포 날짜: ${{ github.event.head_commit.timestamp || github.event.pull_request.merged_at }}
            - 커밋 메시지: ${{ github.event.head_commit.message || github.event.pull_request.title }}
          files: |
            build/libs/*.jar
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: 6. 빌드 파일 서버로 전송 (SCP)
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.REMOTE_IP }}
          username: ${{ secrets.REMOTE_USER }}
          password: ${{ secrets.REMOTE_PASSWORD }}
          source: "build/libs/*.jar"
          target: "~/app"
          strip_components: 2

      - name: 7. 서버에서 애플리케이션 실행 및 백업 (SSH)
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.REMOTE_IP }}
          username: ${{ secrets.REMOTE_USER }}
          password: ${{ secrets.REMOTE_PASSWORD }}
          script: |
            # Zsh에서 파일이 없을 때 에러내는 것 방지
            [[ -n $ZSH_VERSION ]] && setopt NULL_GLOB 2>/dev/null || true
            
            echo "--- 서버 배포 스크립트 시작 ---"
            APP_PATH="$HOME/app"
            BACKUP_PATH="$APP_PATH/backup"
            mkdir -p $BACKUP_PATH
            
            # 7-1. 구버전 파일 백업
            echo "구버전 파일 백업 중..."
            ls -t $APP_PATH/main-api-*.jar 2>/dev/null | tail -n +2 | while read -r old_jar; do
                TIMESTAMP=$(date +%Y%m%d_%H%M%S)
                mv "$old_jar" "$BACKUP_PATH/$(basename "$old_jar" .jar)_$TIMESTAMP.jar"
                echo "백업 완료: $old_jar"
            done

            # 7-2. 기존 프로세스 종료
            echo "기존 프로세스 종료 중..."
            PID=$(pgrep -f 'main-api' || true)
            if [ -n "$PID" ]; then
              kill -15 $PID 2>/dev/null || true
              sleep 7
              kill -9 $PID 2>/dev/null || true
            fi
            
            # 7-3. 불필요한 파일 정리
            rm -f $APP_PATH/*-plain.jar 2>/dev/null || true

            # 7-4. 새로운 버전 실행 (주석 해제 필요 시 사용)
            # NEW_JAR=$(ls -t $APP_PATH/main-api-*.jar 2>/dev/null | head -n 1)
            # if [ -n "$NEW_JAR" ]; then
            #   nohup java -jar "$NEW_JAR" \
            #     --spring.config.location=file:$APP_PATH/application.yml,file:$APP_PATH/application-oauth.yml \
            #     > $APP_PATH/app.log 2>&1 &
            # fi