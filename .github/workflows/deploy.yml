name: 애랑해 메인 서버 배포 (CI/CD)

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
    types: [closed]

jobs:
  build-and-deploy:
    # 푸시 이벤트이거나, PR이 머지된 경우에만 실행
    if: github.event_name == 'push' || (github.event_name == 'pull_request' && github.event.pull_request.merged == true)
    runs-on: ubuntu-latest

    steps:
      - name: 1. 소스 코드 가져오기
        uses: actions/checkout@v4

      - name: 2. 자바 21 환경 설정
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: 3. 빌드 권한 부여
        run: chmod +x gradlew

      - name: 4. 프로젝트 빌드 (테스트 제외)
        run: ./gradlew clean build -x test

      - name: 5. 빌드 파일 서버로 전송 (SCP)
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.REMOTE_IP }}
          username: ${{ secrets.REMOTE_USER }}
          password: ${{ secrets.REMOTE_PASSWORD }}
          source: "build/libs/*.jar"
          target: "~/app"
          strip_components: 2

      - name: 6. 서버에서 애플리케이션 실행 및 백업 (SSH)
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.REMOTE_IP }}
          username: ${{ secrets.REMOTE_USER }}
          password: ${{ secrets.REMOTE_PASSWORD }}
          script: |
            # Zsh 환경 호환성 설정
            [[ -n $ZSH_VERSION ]] && setopt NULL_GLOB 2>/dev/null || true
            
            echo "--- 서버 배포 스크립트 시작 ---"
            APP_PATH="$HOME/app"
            BACKUP_PATH="$APP_PATH/backup"
            mkdir -p $BACKUP_PATH
            
            # 6-1. 구버전 파일 백업
            # 새로 전송된 파일을 제외한 기존 .jar 파일들을 백업 디렉토리로 이동
            echo "구버전 파일 백업 중..."
            ls -t $APP_PATH/main-api-*.jar 2>/dev/null | tail -n +2 | while read -r old_jar; do
                TIMESTAMP=$(date +%Y%m%d_%H%M%S)
                mv "$old_jar" "$BACKUP_PATH/$(basename "$old_jar" .jar)_$TIMESTAMP.jar"
                echo "백업 완료: $old_jar"
            done

            # 6-2. 기존 프로세스 종료
            echo "기존 프로세스 종료 중..."
            PID=$(pgrep -f 'main-api' || true)
            if [ -n "$PID" ]; then
              kill -15 $PID 2>/dev/null || true
              sleep 7
              kill -9 $PID 2>/dev/null || true
            fi
            
            # 6-3. 불필요한 빌드 아티팩트 정리
            rm -f $APP_PATH/*-plain.jar 2>/dev/null || true

            # 6-4. 새로운 버전 실행 (실행 위치 고정)
            echo "새로운 버전 실행 시도..."
            # 최신 파일을 찾음
            NEW_JAR_PATH=$(ls -t $APP_PATH/main-api-*.jar 2>/dev/null | head -n 1)

            if [ -z "$NEW_JAR_PATH" ]; then
              echo "실행할 JAR 파일을 찾을 수 없습니다."
              exit 1
            fi

            NEW_JAR_NAME=$(basename "$NEW_JAR_PATH")
            echo "실행 파일: $NEW_JAR_NAME"

            # 작업 디렉토리를 app으로 이동 후 실행 (상대 경로 및 로그 위치 일관성 유지)
            cd $APP_PATH
            nohup java -jar "$NEW_JAR_NAME" \
              --spring.config.location=file:./application.yml,file:./application-oauth.yml \
              > ./app.log 2>&1 &

            # 6-5. 실행 결과 모니터링
            echo "스프링 부트 초기화 대기 중 (15초)..."
            sleep 15

            if pgrep -f 'main-api' > /dev/null; then
              echo "--- [성공] 서버가 $APP_PATH 위치에서 정상 실행되었습니다! ---"
              ps -ef | grep 'main-api' | grep -v grep
            else
              echo "--- [실패] 서버 실행 실패. 최신 로그 내용을 확인하세요. ---"
              tail -n 30 ./app.log
              exit 1
            fi