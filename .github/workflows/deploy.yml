name: Velo Main API CI/CD

on:
  push:
    tags:
      - 'v*' # 깃허브 태그는 기존처럼 v1.0.0 형식으로 푸시합니다.

permissions:
  contents: write
  packages: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'gradle'

      # 1. 스프링 부트 빌드
      - name: Build with Gradle
        run: ./gradlew bootJar -x test

      # 2. GitHub Release 생성 및 JAR 파일 업로드
      - name: Create GitHub Release
        id: create_release
        uses: softprops/action-gh-release@v2
        with:
          files: build/libs/main-api-*.jar
          body: "Release version ${{ github.ref_name }}"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # 3. 도커 빌드를 위한 로그인 (Docker Hub & GitHub Packages)
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Log in to GitHub Container Registry (GHCR)
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # 4. 태그명에서 앞글자 'v'를 제거하고 소문자 레포명 셋업하기
      - name: Set up clean version and lower case repo name
        run: |
          # v1.0.0에서 v를 제외한 1.0.0만 추출하여 CLEAN_VERSION에 저장
          echo "CLEAN_VERSION=${GITHUB_REF_NAME#v}" >> ${GITHUB_ENV}
          echo "REPO_LC=${GITHUB_REPOSITORY,,}" >> ${GITHUB_ENV}

      # 4-2. [추가] 깨끗한 도커 빌드 환경(Buildx)을 초기화하여 캐시 및 unknown blob 에러 방지
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 5. 도커 이미지 빌드 후 양쪽 저장소에 동시 푸시 (v가 빠진 버전 태그 적용)
      - name: Build and push Docker images
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          provenance: false #  GHCR 업로드 시 'unknown blob' 에러를 방지
          tags: |
            oxxultus/velo-main:latest
            oxxultus/velo-main:${{ env.CLEAN_VERSION }}
            ghcr.io/${{ env.REPO_LC }}:latest
            ghcr.io/${{ env.REPO_LC }}:${{ env.CLEAN_VERSION }}

      # 6. 미니 서버에 SSH로 원격 접속하여 쿠버네티스 팟 무중단 배포 재시작
      - name: Deploy to Kubernetes via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.REMOTE_IP }}
          username: ${{ secrets.REMOTE_USER }}
          password: ${{ secrets.REMOTE_PASSWORD }}
          port: 22
          script: |
            kubectl rollout restart deployment/velo-main-api